name: "Terraform Smart Pipeline"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.5.0"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: Detect which directories have changed and build a dynamic matrix
  # ─────────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
      global_changed: ${{ steps.set-matrix.outputs.global_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed paths and build matrix
        id: set-matrix
        run: |
          # Resolve the diff range depending on event type
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "### Changed files:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$CHANGED" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          GLOBAL_CHANGED=false
          declare -A APP_SET

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            # Shared infrastructure change → downstream impact on all apps
            if [[ "$file" == global/* ]]; then
              GLOBAL_CHANGED=true
            fi

            # App-specific change → plan only the affected app
            if [[ "$file" == apps/*/* ]]; then
              app=$(echo "$file" | cut -d'/' -f2)
              APP_SET["$app"]=1
            fi
          done <<< "$CHANGED"

          # If global changed, force-include every app for downstream validation
          if [ "$GLOBAL_CHANGED" = true ]; then
            for dir in apps/*/; do
              app=$(basename "$dir")
              APP_SET["$app"]=1
            done
          fi

          APPS=()
          for app in "${!APP_SET[@]}"; do
            APPS+=("$app")
          done

          # Sort for deterministic matrix ordering
          IFS=$'\n' APPS=($(sort <<< "${APPS[*]}")); unset IFS

          echo "global_changed=$GLOBAL_CHANGED" >> "$GITHUB_OUTPUT"

          if [ ${#APPS[@]} -eq 0 ]; then
            echo "No Terraform-relevant changes detected."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"app":[]}' >> "$GITHUB_OUTPUT"
          else
            MATRIX=$(printf '%s\n' "${APPS[@]}" | jq -R . | jq -sc '{"app":.}')
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "Apps to plan: ${APPS[*]}"
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Run terraform plan for each affected app in parallel
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: "Plan: ${{ matrix.app }}"
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false

    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Publish Plan to Job Summary
        if: always()
        run: |
          {
            echo "## Terraform Plan — \`${{ matrix.app }}\`"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"
            echo "| Format | \`${{ steps.fmt.outcome }}\` |"
            echo "| Init | \`${{ steps.init.outcome }}\` |"
            echo "| Validate | \`${{ steps.validate.outcome }}\` |"
            echo "| Plan | \`${{ steps.plan.outcome }}\` |"
            echo ""
            echo "<details><summary>Plan Output (click to expand)</summary>"
            echo ""
            echo '```'
            cat plan_output.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3: No-op job so required status checks pass on docs-only changes
  # ─────────────────────────────────────────────────────────────────────────────
  skip:
    name: "No Infrastructure Changes"
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Report skip
        run: |
          echo "## Pipeline Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "No Terraform-relevant files changed. No plans executed." >> "$GITHUB_STEP_SUMMARY"
          echo "Pipeline skipped — no infrastructure changes detected."
